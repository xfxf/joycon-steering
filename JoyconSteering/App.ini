; JoyconSteering — configuration
; Left Joy-Con (Switch 1) as a steering wheel via Bluetooth + vJoy.
; Edit and save; restart the app to apply.

[device]
; left | right
joycon_side = left
; vJoy device index (1-16). Configure this device in vJoyConf with X axis enabled,
; Y and Rz axes enabled if using stick-Y throttle/brake, and at least 16 buttons.
vjoy_device_id = 1

[steering]
; Which rotation axis drives the steering wheel.
;   auto  = wheel (recommended for any wheel-grip orientation, including tilted mounts)
;   wheel = body-frame Z gyro integration. Tilt-invariant, unbounded (going past full
;           lock clamps at max instead of wrapping to the opposite side).
;   yaw   = world-frame yaw (Madgwick Euler). Wraps at ±180°, affected by tilted grips.
;   roll  = world-frame roll.
;   pitch = world-frame pitch.
axis = auto

; How far you tilt the controller in EACH direction for full steering lock, in degrees.
; 180 means you tilt 180 deg right of center to get full right lock (sim-racing feel).
; 90 means tilt 90 deg = full lock (twitchier, controller-stick feel).
; Smaller = more sensitive (less travel needed). Larger = longer pull / more precision.
range_degrees = 180

; Deadzone around center, in degrees of physical rotation.
deadzone_degrees = 1.5

; Exponential smoothing (ms). 0 = off. 8-15ms feels good.
smoothing_ms = 10

; Invert direction. Default true so that tilting the wheel left turns the car left
; (matching natural expectation); set to false if direction feels reversed.
invert = true

[throttle_brake]
; Source for throttle/brake:
;   stick   = left analog stick Y (up=throttle, down=brake)  [analog, recommended]
;   buttons = L = throttle, ZL = brake (digital)
;   none    = do not output throttle/brake (bind in-game to keyboard/another device)
mode = stick

; Stick deadzone (0.0 - 1.0) when mode = stick.
stick_deadzone = 0.15

[buttons]
; Map left-Joy-Con buttons to vJoy button numbers (1-128).
; Set to 0 to disable a button.
; Available Joy-Con buttons: up, down, left, right, l, zl, minus, stick, sl, sr, capture
up = 1
down = 2
left = 3
right = 4
l = 5
zl = 6
minus = 7
stick = 8
sl = 9
sr = 10
capture = 11

[recenter]
; Press this Joy-Con button to set "this is straight ahead".
; Any name from [buttons] above. "none" to disable.
button = stick

; If non-zero, auto-recenter whenever the Joy-Con has been still for this many seconds.
; 0 = disabled. 3.0 is a reasonable starting value if you want it.
auto_recenter_idle_seconds = 0

[fusion]
; Madgwick filter beta. Higher = trusts accelerometer more (faster drift correction,
; less smooth). 0.04-0.10 is the useful range. Increase if you see drift between races.
madgwick_beta = 0.05
